version: "3.8"

services:
  backend:
    build: ./backend-java
    container_name: support-backend
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=<your api key>
    restart: always

  frontend:
    build: ./frontend
    container_name: support-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always